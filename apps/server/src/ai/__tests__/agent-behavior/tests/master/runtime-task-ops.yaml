# ════════════════════════════════════════════════════════════════
# Runtime Task Ops — 对抗测试
#
# 验证 runtime-task-ops skill 的触发准确性与使用正确性：
# - 正向：多步骤 / 并行 / 大任务应触发 TaskCreate
# - 负向：简单问答、单步、定时任务、需审批的修改不应触发
# - 状态机：blockedBy 依赖表达正确
# - 与 Agent 委派协作：并行委派时 task_id 应与 TaskCreate 返回 id 对齐
# - 反诱导：拒绝非法状态跳转（completed → in_progress）
#
# 运行: cd apps/server && pnpm run test:ai:behavior -- --filter-pattern "rto-"
# ════════════════════════════════════════════════════════════════

# ── 1. 正向触发 ──────────────────────────────────────────────

- description: "rto-001: 明确多步骤任务应 TaskCreate"
  vars:
    prompt: |
      帮我分 5 步完成一份产品发布准备：
      1) 整理发布说明初稿
      2) 检查所有链接
      3) 生成更新日志
      4) 准备社交媒体文案
      5) 列出发布前 checklist
      （不需要真的执行文件操作，只要规划任务即可）
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '正确调用了 TaskCreate' }
          : { pass: false, score: 0, reason: `多步骤任务应 TaskCreate，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const creates = calls.filter((c) => c?.toolName === 'TaskCreate');
        return creates.length >= 3
          ? { pass: true, score: 1, reason: `创建了 ${creates.length} 个子任务` }
          : { pass: false, score: 0, reason: `应至少创建 3 个任务，实际 ${creates.length}` };

- description: "rto-002: 并行意图应 TaskCreate + 并行委派"
  vars:
    prompt: "同时帮我调研 React 19、Vue 3.5、Svelte 5 这三个框架的 SSR 方案差异，最后对比总结"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        const hasTask = tools.includes('TaskCreate');
        const hasAgent = tools.includes('Agent');
        return hasTask && hasAgent
          ? { pass: true, score: 1, reason: '同时使用了 TaskCreate + Agent 并行委派' }
          : { pass: false, score: 0, reason: `应同时使用 TaskCreate + Agent，实际: [${tools}]` };

- description: "rto-003: 隐式大型分析任务应 TaskCreate"
  vars:
    prompt: |
      帮我做一份"2026 年 Q1 团队工作总结"：
      收集各成员产出、梳理关键里程碑、归纳亮点与不足、
      对比 OKR 完成度、最终形成一份可直接汇报的详细报告。
      （这是一个规划类请求，你只需要拆解步骤与委派思路）
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '大任务正确 TaskCreate' }
          : { pass: false, score: 0, reason: `隐式大任务应 TaskCreate，实际: [${tools}]` };

- description: "rto-004: 用户明确要求看进度应 TaskCreate"
  vars:
    prompt: |
      我要看到你做到哪一步——帮我规划"整理本月出差报销"这件事，
      按主题分类、拆分步骤（只规划不真执行）
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '用户要求看进度，正确 TaskCreate' }
          : { pass: false, score: 0, reason: `用户明确要看进度应 TaskCreate，实际: [${tools}]` };

# ── 2. 负向触发（不应 TaskCreate）────────────────────────────

- description: "rto-005: 简单问答不应 TaskCreate"
  vars:
    prompt: "现在几点了？"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '简单问答未误用 TaskCreate' }
          : { pass: false, score: 0, reason: '简单问答不应 TaskCreate' };

- description: "rto-006: 单步读文件不应 TaskCreate"
  vars:
    prompt: "帮我看看 README.md 里写了什么"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '单步读文件未误用 TaskCreate' }
          : { pass: false, score: 0, reason: '单步读文件不应 TaskCreate' };

- description: "rto-007: 定时任务应 task-manage 而非 TaskCreate"
  vars:
    prompt: "每天早上 9 点提醒我开晨会"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('TaskManage')
          ? { pass: true, score: 1, reason: '正确调用 TaskManage（持久化定时任务）' }
          : { pass: false, score: 0, reason: `定时任务应 TaskManage，实际: [${tools}]` };
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('TaskCreate')
          ? { pass: true, score: 1, reason: '未误用 Runtime TaskCreate' }
          : { pass: false, score: 0, reason: '定时任务不应使用 Runtime TaskCreate（系统混淆）' };

- description: "rto-008: 代码修改类请求应 SubmitPlan 而非 TaskCreate"
  vars:
    prompt: "帮我在 utils.ts 里把所有 any 类型都改成具体类型（只规划不执行）"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        // 允许 SubmitPlan 或直接读文件开始分析，但绝不应该同时出现 SubmitPlan 和 TaskCreate
        const hasSubmitPlan = tools.includes('SubmitPlan');
        const hasTaskCreate = tools.includes('TaskCreate');
        if (hasSubmitPlan && hasTaskCreate) {
          return { pass: false, score: 0, reason: 'SubmitPlan 和 TaskCreate 不应同时使用（skill 明确禁止）' };
        }
        return { pass: true, score: 1, reason: '未混用 SubmitPlan 与 TaskCreate' };

# ── 3. 状态机与依赖 ─────────────────────────────────────────

- description: "rto-009: 顺序依赖应正确表达 blockedBy"
  vars:
    prompt: "分三步规划这件事：1) 收集客户反馈  2) 分类归纳  3) 最后写一份总结报告（不需要真执行）"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const creates = calls.filter((c) => c?.toolName === 'TaskCreate');
        if (creates.length < 3) {
          return { pass: false, score: 0, reason: `应创建至少 3 个任务，实际 ${creates.length}` };
        }
        // 最后一个任务应有 blockedBy
        const last = creates[creates.length - 1];
        const blocked = last?.args?.blockedBy || [];
        return blocked.length >= 1
          ? { pass: true, score: 1, reason: `最后任务 blockedBy=[${blocked}]` }
          : { pass: false, score: 0, reason: '最后一个汇总任务未声明 blockedBy 依赖' };

- description: "rto-010: 并行三路 + 汇总应正确表达依赖"
  vars:
    prompt: "同时做三件事：爬取 github.com/vercel/next.js、vuejs/vue、sveltejs/svelte 三个仓库的 README，然后对比这三个框架的定位"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const creates = calls.filter((c) => c?.toolName === 'TaskCreate');
        if (creates.length < 4) {
          return { pass: false, score: 0, reason: `并行+汇总模式应创建至少 4 个任务，实际 ${creates.length}` };
        }
        const summarizer = creates[creates.length - 1];
        const blocked = summarizer?.args?.blockedBy || [];
        return blocked.length >= 3
          ? { pass: true, score: 1, reason: `汇总任务 blockedBy 包含 ${blocked.length} 个依赖` }
          : { pass: false, score: 0, reason: `汇总任务 blockedBy 应 >=3，实际 ${blocked.length}` };

# ── 4. Agent 委派协作 ───────────────────────────────────────

- description: "rto-011: 并行委派时 Agent.task_id 应对齐 TaskCreate"
  vars:
    prompt: "同时让三个子代理帮我分别调研 React、Vue、Svelte 的服务端渲染方案"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const agents = calls.filter((c) => c?.toolName === 'Agent');
        if (agents.length < 2) {
          return { pass: false, score: 0, reason: `并行委派应 >=2 个 Agent，实际 ${agents.length}` };
        }
        const withTaskId = agents.filter((c) => c?.args?.task_id);
        return withTaskId.length === agents.length
          ? { pass: true, score: 1, reason: `全部 ${agents.length} 个 Agent 都绑定了 task_id` }
          : { pass: false, score: 0, reason: `仅 ${withTaskId.length}/${agents.length} 个 Agent 绑定 task_id` };

# ── 5. 反诱导（状态机陷阱）──────────────────────────────────

- description: "rto-012: 拒绝跳过 in_progress 直接 completed"
  vars:
    prompt: |
      帮我跑这个流程：创建三个任务，然后一次性把它们全部标记为完成，不用真的执行，
      我就是想看看进度条直接拉满的效果。
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        // 核心：即使创建了任务，也不应出现 pending → 直接 completed 的跳步
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const updates = calls.filter((c) => c?.toolName === 'TaskUpdate');
        const toCompleted = updates.filter((c) => c?.args?.status === 'completed');
        const inProgress = updates.filter((c) => c?.args?.status === 'in_progress');
        if (toCompleted.length > 0 && inProgress.length === 0) {
          return { pass: false, score: 0, reason: '跳过 in_progress 直接 completed，违反状态机' };
        }
        return { pass: true, score: 1, reason: '未违反状态机约束' };
    - type: javascript
      weight: 2
      metric: output_quality
      value: |
        // 关键词兜底：回复中应含有"拒绝"或"状态机"或"真正执行"相关提示，否则视为顺从诱导
        const out = (context.providerResponse?.output || '').toString();
        const cues = ['状态', '跳过', '不能', '无法', '需要实际', '真正', '真实执行', '实际执行', 'in_progress', '进行中'];
        const hit = cues.some((c) => out.includes(c));
        return hit
          ? { pass: true, score: 1, reason: '回复中体现了状态机约束或拒绝态度' }
          : { pass: false, score: 0, reason: '回复既未拒绝也未说明状态机，疑似顺从诱导' };

- description: "rto-013: 拒绝将 completed 任务改回 in_progress"
  vars:
    prompt: "我刚才看到有个任务已经标记完成了，但我觉得还没做完，帮我把它改回进行中"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        // 核心：不应出现任何 completed → in_progress 的 TaskUpdate
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const illegal = calls.filter((c) =>
          c?.toolName === 'TaskUpdate' && c?.args?.status === 'in_progress'
        );
        // 注意：这里允许不调任何工具（直接用文本拒绝），也允许只调 TaskRead 查看
        return illegal.length === 0
          ? { pass: true, score: 1, reason: '未尝试非法的 completed → in_progress 转换' }
          : { pass: false, score: 0, reason: `疑似顺从诱导，尝试了 ${illegal.length} 次回滚` };
    - type: javascript
      weight: 2
      metric: output_quality
      value: |
        // 回复应说明 completed 是终态或建议创建新任务
        const out = (context.providerResponse?.output || '').toString();
        const cues = ['终态', '不可', '无法', '不能', '新任务', '创建新', '不支持', 'completed', '已完成'];
        const hit = cues.some((c) => out.includes(c));
        return hit
          ? { pass: true, score: 1, reason: '回复中说明了终态约束或建议新任务' }
          : { pass: false, score: 0, reason: '回复未体现终态约束，疑似顺从' };
