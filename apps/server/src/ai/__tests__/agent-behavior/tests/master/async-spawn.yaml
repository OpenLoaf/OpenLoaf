# ════════════════════════════════════════════════════════════════
# Layer 3: Master Agent 委派行为测试（Promptfoo）
#
# 验证 Master 的 Agent 委派行为模式：
# - 复杂任务时使用 Agent 工具委派子 Agent
# - 默认同步模式（run_in_background 未设置或为 false）
# - 异步模式需显式设置 run_in_background: true
# - 异步委派后直接文本回复，包含"已安排"类确认语
# - 简单任务时不委派
# - 收到 task-report 后能正确引用
# ════════════════════════════════════════════════════════════════

# ── async-001: 复杂任务应委派子 Agent ──
- description: "async-001: 复杂代码分析任务应委派子 Agent"
  vars:
    prompt: |
      帮我分析 src/ai/services/ 目录下所有 TypeScript 文件的代码结构，
      总结每个模块的职责、依赖关系、以及潜在的重构点。输出一份详细报告。
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('Agent')
          ? { pass: true, score: 1, reason: '正确调用了 Agent 工具' }
          : { pass: false, score: 0, reason: `复杂分析任务应委派子 Agent，实际: [${tools}]` };
    - type: javascript
      weight: 3
      metric: agent_delegation_mode
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const agentCall = calls.find((c) => c?.toolName === 'Agent');
        if (!agentCall) {
          return { pass: false, score: 0, reason: '未调用 Agent 工具' };
        }
        // 异步委派核心验证：run_in_background 应为 true
        const bg = agentCall.args?.run_in_background;
        return bg === true
          ? { pass: true, score: 1, reason: 'Agent 使用 run_in_background: true（异步委派正确行为）' }
          : { pass: false, score: 0, reason: `异步委派应设置 run_in_background: true，实际: ${bg}` };

# ── async-002: Master 异步委派后应直接文本回复 ──
- description: "async-002: Master 异步委派后应直接文本回复确认"
  vars:
    prompt: |
      帮我调研一下当前项目的测试覆盖情况，包括单元测试、集成测试、E2E 测试的分布，
      找出覆盖不足的模块，并给出改进建议。
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('Agent')
          ? { pass: true, score: 1, reason: '正确委派子 Agent' }
          : { pass: false, score: 0, reason: `应委派调研子 Agent，实际: [${tools}]` };
    - type: llm-rubric
      weight: 2
      metric: async_reply_quality
      value: |
        Master Agent 应在异步委派子 Agent 后立即给用户一个简短的确认回复，表示已安排任务。
        回复应当：
        1. 明确告知用户任务已被安排/委派给子 Agent
        2. 简要说明子 Agent 会做什么
        3. 不应说"请等待"或暗示需要长时间等待（因为是异步的）
        4. 语气自然友好

# ── async-003: 委派后的文本包含确认语 ──
- description: "async-003: 异步委派后的文本回复包含任务确认"
  vars:
    prompt: |
      帮我重构 utils/dateHelper.ts，把所有 moment.js 调用替换为 dayjs。
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('Agent')
          ? { pass: true, score: 1, reason: '正确委派子 Agent' }
          : { pass: false, score: 0, reason: `重构任务应委派子 Agent，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: async_confirmation_text
      value: |
        const output = context.providerResponse?.output || '';
        // 检查回复中是否包含确认类关键词
        const confirmPatterns = [
          /已安排|已分配|已派|已委托|已指派/,
          /arranged|delegated|assigned|dispatched/i,
          /子代理|子 Agent|子agent/i,
          /后台|异步|background/i,
          /会为你|将为你|将会/,
        ];
        const hasConfirm = confirmPatterns.some((p) => p.test(output));
        return hasConfirm
          ? { pass: true, score: 1, reason: '回复包含任务确认语' }
          : { pass: false, score: 0, reason: `回复应包含"已安排"类确认语，实际: "${output.slice(0, 200)}"` };

# ── async-004: 简单任务不应委派 ──
- description: "async-004: 简单问答不应委派子 Agent"
  vars:
    prompt: "现在几点了？"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('Agent')
          ? { pass: true, score: 1, reason: '简单问题未委派（正确）' }
          : { pass: false, score: 0, reason: '简单时间查询不应委派子 Agent' };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('time-now')
          ? { pass: true, score: 1, reason: '正确直接调用 time-now' }
          : { pass: false, score: 0, reason: `应直接调用 time-now，实际: [${tools}]` };

