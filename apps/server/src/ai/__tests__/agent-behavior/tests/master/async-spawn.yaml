        return !tools.includes('spawn-agent')
          ? { pass: true, score: 1, reason: '简单文件读取未 spawn（正确）' }
          : { pass: false, score: 0, reason: '简单文件读取不应 spawn 子 Agent' };

- description: "async-006: 简单创建任务不应 spawn"
  vars:
    prompt: "帮我创建一个任务：下午三点开会"
  assert:
    - type: javascript
      weight: 3
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('spawn-agent')
          ? { pass: true, score: 1, reason: '简单任务创建未 spawn（正确）' }
          : { pass: false, score: 0, reason: '简单任务创建不应 spawn 子 Agent' };

# ── async-007: 收到 task-report 后能正确引用 ──
- description: "async-007: Master 收到 task-report 后能引用结果"
  vars:
    turns: |
      [
        {"text": "帮我分析一下 src/utils/ 目录的代码结构"},
        {"text": "[Task Complete] Agent \"coder\" (agent_abc): 分析完成。src/utils/ 目录包含 8 个文件：dateHelper.ts 处理日期格式化、stringUtils.ts 处理字符串操作、fileHelper.ts 处理文件读写、validator.ts 数据校验、logger.ts 日志工具、config.ts 配置管理、crypto.ts 加密工具、cache.ts 缓存管理。其中 dateHelper.ts 仍在使用 moment.js，建议迁移到 dayjs。"}
      ]
    prompt: "多轮：spawn 后收到 task-report"
  assert:
    - type: llm-rubric
      weight: 2
      metric: output_quality
      value: |
        用户第二条消息是一个 task-report（子 Agent 完成报告）。
        Master 的回复应当：
        1. 识别这是子 Agent 的完成报告
        2. 引用或总结报告中的关键发现（如 8 个文件、moment.js 迁移建议等）
        3. 不应假装自己做了分析
        4. 可以主动提供下一步建议
