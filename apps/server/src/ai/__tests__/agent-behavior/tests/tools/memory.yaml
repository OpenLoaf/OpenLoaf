# ────────── 负向用例：不应触发 MemorySave ──────────

- description: "mem-neg-001: 闲聊不应触发 MemorySave"
  vars:
    prompt: "今天天气真不错"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('MemorySave')
          ? { pass: true, score: 1, reason: '正确未调用 MemorySave' }
          : { pass: false, score: 0, reason: `闲聊不应保存记忆，实际调用了: [${tools}]` };

- description: "mem-neg-002: 一次性读文件任务不应触发 MemorySave"
  vars:
    prompt: "帮我看看 README.md 里写了啥"
  assert:
