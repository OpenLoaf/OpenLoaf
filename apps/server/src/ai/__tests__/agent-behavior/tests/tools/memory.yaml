# ════════════════════════════════════════════════════════════════
# MemorySave 主动记忆触发测试（Master E2E pipeline）
#
# 主动保存判定准则（harness-v5）：用户表达偏好 / 纠正行为 / 告知角色背景 /
# 反复适用的约定 —— 即便用户没说"记住"，也应主动 MemorySave。
# 反向：闲聊、一次性任务、可从代码读到的事实 —— 不应保存。
# ════════════════════════════════════════════════════════════════

- description: "mem-001: 用户表达饮食偏好应主动触发 MemorySave"
  vars:
    prompt: "我是素食主义者，以后推荐餐厅别给我推烤肉店"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('MemorySave')
          ? { pass: true, score: 1, reason: '正确调用了 MemorySave' }
          : { pass: false, score: 0, reason: `未调用 MemorySave，实际: [${tools}]` };
    - type: javascript
      weight: 1
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'MemorySave');
        if (!call) return { pass: false, score: 0, reason: '未找到 MemorySave 调用' };
        const content = String(call.args?.content ?? '');
        const ok = /素食|vegetarian|不吃肉|烤肉|veg/i.test(content);
        return ok
          ? { pass: true, score: 1, reason: 'content 含素食偏好关键词' }
          : { pass: false, score: 0, reason: `content 未包含饮食偏好关键词，实际: ${content.slice(0, 80)}` };

- description: "mem-002: 用户明确纠正工具选择应主动触发 MemorySave"
  vars:
    prompt: "你刚才用 shell-command 列文件夹太绕了，下次列目录直接用 list-dir，别再走 shell 了"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('MemorySave')
          ? { pass: true, score: 1, reason: '正确调用了 MemorySave' }
          : { pass: false, score: 0, reason: `未调用 MemorySave，实际: [${tools}]` };
    - type: javascript
      weight: 1
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'MemorySave');
        if (!call) return { pass: false, score: 0, reason: '未找到 MemorySave 调用' };
        const content = String(call.args?.content ?? '');
        // 用户说的 "list-dir" / "shell-command" 可能被模型翻译为项目实际工具名
        // （如 Glob/Bash）或保留原名，只要能体现"列目录的工具偏好"即可
        const ok = /list-dir|shell|列目录|目录|Glob|Bash|ls\b/i.test(content);
        return ok
          ? { pass: true, score: 1, reason: 'content 记录了工具纠正规则' }
          : { pass: false, score: 0, reason: `content 未包含工具纠正语义，实际: ${content.slice(0, 80)}` };

