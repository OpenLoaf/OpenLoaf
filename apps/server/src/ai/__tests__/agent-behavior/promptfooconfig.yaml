# OpenLoaf AI Agent E2E 行为测试
# 所有测试通过完整 AiExecuteService pipeline 运行（含 command 解析、skill 注入、Master Agent + ToolSearch）
#
# 运行方式: cd apps/server && pnpm run test:ai:behavior
# 查看结果: cd apps/server && pnpm run test:ai:behavior:view
# 按前缀过滤: --filter-pattern "cmd-"

description: "OpenLoaf AI Agent E2E 行为测试"

prompts:
  - "{{prompt}}"

providers:
  - id: file://openloaf-universal-provider.ts
    label: "OpenLoaf Universal"

defaultTest:
  options:
    timeout: 90000
    provider:
      id: openai:chat:qwen3-235b-a22b
      config:
        apiBaseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
        apiKeyEnvar: PROMPTFOO_GRADING_API_KEY

tests:
  - file://tests/master.yaml
  - file://tests/calendar.yaml
  - file://tests/email.yaml
  - file://tests/tools.yaml
  - file://tests/commands.yaml
